<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0.95" />
    </linearGradient>
  </defs>

  <!-- Night sky -->
  <rect width="900" height="280" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="50" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="150" cy="45" r="1" fill="white" opacity="0.5"/>
  <circle cx="280" cy="18" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="420" cy="35" r="1" fill="white" opacity="0.4"/>
  <circle cx="550" cy="12" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="680" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="780" cy="20" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="850" cy="50" r="1" fill="white" opacity="0.4"/>
  <circle cx="100" cy="55" r="1" fill="white" opacity="0.3"/>
  <circle cx="620" cy="55" r="1" fill="white" opacity="0.3"/>

  <!-- Canal water -->
  <rect x="0" y="200" width="900" height="80" fill="url(#water)"/>

  <!-- Water reflections -->
  <line x1="30" y1="215" x2="70" y2="215" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <line x1="150" y1="230" x2="200" y2="230" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="220" x2="360" y2="220" stroke="white" stroke-width="0.5" opacity="0.12"/>
  <line x1="500" y1="235" x2="550" y2="235" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="650" y1="218" x2="710" y2="218" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <line x1="800" y1="228" x2="860" y2="228" stroke="white" stroke-width="0.5" opacity="0.1"/>

  <!-- Canal edge / bridge wall -->
  <rect x="0" y="195" width="900" height="8" rx="2" fill="#2a2a3e" opacity="0.8"/>

  <!-- Row houses - Dutch canal houses with stepped gables -->

  <!-- House 1 - Red (Postcode Loterij red) -->
  <rect x="20" y="105" width="55" height="95" fill="#E40421"/>
  <polygon points="22,105 47,72 75,105" fill="#B8031A"/>
  <rect x="32" y="120" width="12" height="16" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="52" y="120" width="12" height="16" rx="1" fill="#FFE4B5" opacity="0.7"/>
  <rect x="32" y="148" width="12" height="16" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="52" y="148" width="12" height="16" rx="1" fill="#FFE4B5" opacity="0.7"/>
  <rect x="40" y="170" width="16" height="30" rx="1" fill="#8B4513"/>

  <!-- House 2 - Orange -->
  <rect x="80" y="95" width="50" height="105" fill="#F39200"/>
  <rect x="80" y="95" width="50" height="8" fill="#D47E00"/>
  <polygon points="82,95 105,68 128,95" fill="#D47E00"/>
  <rect x="90" y="112" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="108" y="112" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.8"/>
  <rect x="90" y="138" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.7"/>
  <rect x="108" y="138" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="97" y="168" width="14" height="32" rx="1" fill="#8B4513"/>

  <!-- House 3 - Dark red / brown -->
  <rect x="135" y="88" width="58" height="112" fill="#8B2500"/>
  <!-- Stepped gable -->
  <rect x="145" y="78" width="38" height="10" fill="#8B2500"/>
  <rect x="150" y="68" width="28" height="10" fill="#8B2500"/>
  <rect x="155" y="58" width="18" height="10" fill="#8B2500"/>
  <rect x="147" y="108" width="11" height="15" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="168" y="108" width="11" height="15" rx="1" fill="#FFE4B5" opacity="0.8"/>
  <rect x="147" y="135" width="11" height="15" rx="1" fill="#FFE4B5" opacity="0.7"/>
  <rect x="168" y="135" width="11" height="15" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="155" y="165" width="16" height="35" rx="1" fill="#6B3000"/>

  <!-- House 4 - Blue -->
  <rect x="198" y="100" width="48" height="100" fill="#0069B4"/>
  <polygon points="200,100 222,70 244,100" fill="#005A9C"/>
  <rect x="207" y="115" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.8"/>
  <rect x="227" y="115" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="207" y="142" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="227" y="142" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.7"/>
  <rect x="214" y="170" width="14" height="30" rx="1" fill="#8B4513"/>

  <!-- House 5 - Green -->
  <rect x="250" y="92" width="52" height="108" fill="#23A638"/>
  <rect x="250" y="92" width="52" height="6" fill="#1D8C2F"/>
  <polygon points="252,92 276,65 300,92" fill="#1D8C2F"/>
  <rect x="260" y="110" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="280" y="110" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.8"/>
  <rect x="260" y="138" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.7"/>
  <rect x="280" y="138" width="10" height="14" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="268" y="168" width="14" height="32" rx="1" fill="#8B4513"/>

  <!-- House 6 - Red again -->
  <rect x="307" y="98" width="45" height="102" fill="#E40421"/>
  <polygon points="309,98 329,72 350,98" fill="#B8031A"/>
  <rect x="315" y="115" width="9" height="12" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="333" y="115" width="9" height="12" rx="1" fill="#FFE4B5" opacity="0.8"/>
  <rect x="315" y="140" width="9" height="12" rx="1" fill="#FFE4B5" opacity="0.7"/>
  <rect x="333" y="140" width="9" height="12" rx="1" fill="#FFE4B5" opacity="0.9"/>
  <rect x="322" y="170" width="12" height="30" rx="1" fill="#8B4513"/>

  <!-- Confetti / celebration particles -->
  <rect x="100" y="30" width="4" height="8" rx="1" fill="#F39200" opacity="0.8" transform="rotate(25 102 34)"/>
  <rect x="180" y="42" width="4" height="8" rx="1" fill="#E40421" opacity="0.7" transform="rotate(-15 182 46)"/>
  <rect x="260" y="25" width="4" height="8" rx="1" fill="#23A638" opacity="0.8" transform="rotate(40 262 29)"/>
  <rect x="60" y="48" width="4" height="8" rx="1" fill="#0069B4" opacity="0.6" transform="rotate(-30 62 52)"/>
  <rect x="320" y="38" width="4" height="8" rx="1" fill="#F39200" opacity="0.7" transform="rotate(15 322 42)"/>
  <circle cx="140" cy="35" r="3" fill="#E40421" opacity="0.6"/>
  <circle cx="230" cy="50" r="2.5" fill="#F39200" opacity="0.5"/>
  <circle cx="300" cy="30" r="3" fill="#23A638" opacity="0.6"/>
  <circle cx="80" cy="38" r="2" fill="#0069B4" opacity="0.5"/>
  <circle cx="340" cy="48" r="2.5" fill="#E40421" opacity="0.5"/>

  <!-- Main title area - right side -->
  <text x="430" y="105" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="white" letter-spacing="1">Postcode Loterij</text>
  <text x="430" y="148" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#F39200" font-weight="bold">AI Lab</text>

  <!-- Subtitle -->
  <text x="430" y="178" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="white" opacity="0.75">Hands-on Snowflake Cortex AI Workshop</text>

  <!-- Snowflake icon next to subtitle -->
  <g transform="translate(408, 170)" fill="white" opacity="0.6">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5.2" y1="-3" x2="5.2" y2="3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5.2" y1="3" x2="5.2" y2="-3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Divider line -->
  <line x1="430" y1="188" x2="700" y2="188" stroke="#E40421" stroke-width="2" opacity="0.6"/>

  <!-- Bottom tags -->
  <rect x="430" y="198" width="82" height="24" rx="12" fill="#E40421" opacity="0.3"/>
  <text x="471" y="215" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.9">Cortex AI</text>

  <rect x="520" y="198" width="82" height="24" rx="12" fill="#F39200" opacity="0.3"/>
  <text x="561" y="215" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.9">Streamlit</text>

  <rect x="610" y="198" width="105" height="24" rx="12" fill="#0069B4" opacity="0.3"/>
  <text x="662" y="215" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.9">Semantic View</text>

  <rect x="723" y="198" width="105" height="24" rx="12" fill="#23A638" opacity="0.3"/>
  <text x="775" y="215" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="white" text-anchor="middle" opacity="0.9">Cortex Agent</text>

  <!-- Duration -->
  <text x="855" y="105" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.5">Duration</text>
  <text x="855" y="130" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold" opacity="0.8">1.5h</text>

</svg>
